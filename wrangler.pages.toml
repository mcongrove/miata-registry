# Pages-only Wrangler config (reference — NOT auto-read by Cloudflare Pages).
#
# wrangler.toml is reserved for the API Worker (main = src/worker/index.ts).
# Pages cannot use the same file: main and pages_build_output_dir are mutually exclusive.
#
# Configure Pages Functions bindings in the Cloudflare dashboard:
#   Pages → miata-registry → Settings → Functions → D1 / KV bindings
#
#   DB    → registry (0c327009-68c1-4f80-9b88-9f8ef2fbfcaa)
#   CACHE → 7fda99700a024497bc3da8172120a3d5
#
# Build settings (dashboard): command `npm run build`, output directory `dist`.

name = "miata-registry"
compatibility_date = "2025-04-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "registry"
database_id = "0c327009-68c1-4f80-9b88-9f8ef2fbfcaa"

[[kv_namespaces]]
binding = "CACHE"
id = "7fda99700a024497bc3da8172120a3d5"
